<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agent7 Settings</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body>
  <div class="container">
    <h1>Settings</h1>

    <section class="section">
      <h2>Shortcuts</h2>
      <form id="shortcuts-form">
        <div class="form-group">
          <label for="shortcut_send-message">Send Message</label>
          <input type="text" id="shortcut_send-message" name="shortcut_send-message" />
        </div>
        <div class="form-group">
          <label for="shortcut_new-task">New Task</label>
          <input type="text" id="shortcut_new-task" name="shortcut_new-task" />
        </div>
        <div class="form-group">
          <label for="shortcut_quick-task">Quick Task</label>
          <input type="text" id="shortcut_quick-task" name="shortcut_quick-task" />
        </div>
        <div class="form-group">
          <label for="shortcut_screenshot">Screenshot</label>
          <input type="text" id="shortcut_screenshot" name="shortcut_screenshot" />
        </div>
        <div class="form-group">
          <label for="shortcut_toggle-autonomous">Toggle Autonomous</label>
          <input type="text" id="shortcut_toggle-autonomous" name="shortcut_toggle-autonomous" />
        </div>
        <button type="submit" class="btn-primary">Save Shortcuts</button>
      </form>
    </section>

    <section class="section">
      <h2>General</h2>
      <div class="form-group">
        <label for="autonomous-mode">Autonomous Mode</label>
        <input type="checkbox" id="autonomous-mode" />
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
  <script>
    const { ipcRenderer } = require('electron');

    // Load current settings
    async function loadSettings() {
      const shortcuts = await ipcRenderer.invoke('settings:get', 'shortcuts');
      if (shortcuts) {
        for (const [key, value] of Object.entries(shortcuts)) {
          const input = document.getElementById(`shortcut_${key}`);
          if (input) input.value = value;
        }
      }
      const autonomous = await ipcRenderer.invoke('settings:get', 'autonomous');
      document.getElementById('autonomous-mode').checked = !!autonomous;
    }

    // Save shortcuts
    document.getElementById('shortcuts-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const shortcuts = {};
      for (const [key, value] of formData.entries()) {
        shortcuts[key.replace('shortcut_', '')] = value;
      }
      await ipcRenderer.invoke('settings:set', 'shortcuts', shortcuts);
      alert('Shortcuts saved');
    });

    // Toggle autonomous mode
    document.getElementById('autonomous-mode').addEventListener('change', async (e) => {
      await ipcRenderer.invoke('settings:set', 'autonomous', e.target.checked);
      ipcRenderer.send('autonomous-changed', e.target.checked);
    });

    loadSettings();
  </script>
</body>
</html>
